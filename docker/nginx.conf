# xqecz-all 反向代理
#
# 作用：在 Node 后端（app:3000，同时托管 API + 前端静态资源 + /uploads）之前
# 做统一的 HTTP 入口，便于后续加 HTTPS / 限流 / 缓存头。
#
# 部署：docker-compose.yml 把本文件挂载到 nginx 的 /etc/nginx/conf.d/default.conf。

upstream xqecz_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 上传文件可能较大，放宽主体大小
    client_max_body_size 256m;

    # 常规安全响应头（后端已用 helmet，这里再补一层）
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # API 反向代理
    location /api/ {
        proxy_pass http://xqecz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 用户上传的静态资源（图片/视频/缩略图）。
    # 若使用对象存储(S3/COS/OSS)，filePath 直接返回 CDN 绝对地址，
    # 此路由仅作为「仍保留在本地磁盘」文件的兜底。
    location /uploads/ {
        proxy_pass http://xqecz_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 前端 SPA（Hash 路由，全部回退到 index.html 由后端托管）
    location / {
        proxy_pass http://xqecz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

