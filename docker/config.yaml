# xqecz-all 配置文件 (Docker)

# 数据库配置
mysql:
  host: "host.docker.internal"
  port: 3306
  user: "root"
  password: "root"
  database: "xiaoquan"
  charset: "utf8mb4"
  max_open_conns: 100
  min_conns: 10

# Redis配置
redis:
  host: "host.docker.internal"
  port: 6379
  password: ""
  db: 0

# 服务器配置
server:
  port: 8080
  upload_dir: "/app/uploads"
  thumbnail_dir: "/app/thumbnails"
  images_dir: "/app/images"
  max_upload_size: 1073741824
  allowed_origins:
    - "*"

# 推荐配置
recommend:
  excluded_tags: []

# 推送配置
push:
  jpush_key: ""
  jpush_secret: ""
  enabled: false

# 垃圾评论API配置
spam_api:
  url: ""

# Tinify压缩配置
tinify:
  api_key: ""
  enabled: false
