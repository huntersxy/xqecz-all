<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.webp">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://xqapi.xiey.work">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="发现精彩二创内容">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="小泉动漫">
    <link rel="apple-touch-icon" href="/favicon.webp">
    <title>小泉动漫二创站</title>

  <body>
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
      <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%" colorInterpolationFilters="sRGB">
        <feImage id="liquid-glass-map" x="0" y="0" width="100%" height="100%" preserveAspectRatio="none" result="map" />
        <feDisplacementMap in="SourceGraphic" in2="map" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
