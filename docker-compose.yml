# xqecz-all 全栈部署 (nginx 反代 + Node.js 后端 + Vue 前端)
#
# 构建并启动：
#   docker compose build && docker compose up -d
#
# 访问：http://localhost:8080  (nginx -> app:3000)
# 健康检查：http://localhost:8080/api/health
#
# 生产化可选：
#   - HTTPS：在 docker/nginx.conf 启用 443 块并放入证书，取消下方 nginx 的 443 端口映射
#   - 对象存储：配齐 S3_* 四项环境变量即启用（否则回落本地 /uploads）
#   - Tinify 压缩：配置 TINIFY_API_KEY 即对原图压缩

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    image: ${XQ_IMAGE:-xqecz}:${XQ_TAG:-latest}
    container_name: xqecz-app
    mem_limit: 512m
    # 仅对内网(nginx)暴露，不再直接发布公网端口
    expose:
      - "3000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
      - DB_PATH=/app/server/data/app.db
      - JWT_SECRET=${JWT_SECRET:-please-change-in-prod}
      # —— 可选：Tinify 原图压缩（不配则原图直出）——
      # - TINIFY_API_KEY=${TINIFY_API_KEY}
      # —— 可选：对象存储（配齐四项才启用，否则用本地 /uploads）——
      # - S3_ENDPOINT=${S3_ENDPOINT}
      # - S3_BUCKET=${S3_BUCKET}
      # - S3_REGION=${S3_REGION}
      # - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      # - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      # - S3_PUBLIC_URL=${S3_PUBLIC_URL}
    volumes:
      - ./docker_data/data:/app/server/data
      - ./docker_data/uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: xqecz-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${XQ_HTTP_PORT:-8080}:80"
      # - "${XQ_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./docker/certs:/etc/nginx/certs:ro   # 启用 HTTPS 时取消注释
    restart: unless-stopped
