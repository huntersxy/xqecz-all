# xqecz-all 全栈部署 (nginx 反代 + Node.js 后端 + Vue 前端 + MySQL + Redis)
#
# 构建并启动：
#   docker compose build && docker compose up -d
#
# 访问：http://localhost:8080  (nginx -> app:3000)
# 健康检查：http://localhost:8080/api/health

services:
  mysql:
    image: mariadb:10.5
    container_name: xqecz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xqecz}
      MYSQL_USER: ${MYSQL_USER:-xqecz}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xqecz}
    volumes:
      - ./docker_data/mysql:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=384M
      --max-connections=200
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: xqecz-redis
    command: redis-server --appendonly yes
    volumes:
      - ./docker_data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    image: ${XQ_IMAGE:-xqecz}:${XQ_TAG:-latest}
    container_name: xqecz-app
    mem_limit: 512m
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-xqecz}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-xqecz}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-xqecz}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PREFIX=xqecz:
      # —— 可选：Tinify 原图压缩 ——
      # - TINIFY_API_KEY=${TINIFY_API_KEY}
      # —— 可选：对象存储 ——
      # - S3_ENDPOINT=${S3_ENDPOINT}
      # - S3_BUCKET=${S3_BUCKET}
      # - S3_REGION=${S3_REGION}
      # - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      # - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      # - S3_PUBLIC_URL=${S3_PUBLIC_URL}
    volumes:
      - ./docker_data/uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: xqecz-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${XQ_HTTP_PORT:-8080}:80"
      # - "${XQ_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./docker/certs:/etc/nginx/certs:ro
    restart: unless-stopped
