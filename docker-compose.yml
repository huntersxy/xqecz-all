# xqecz-all 全栈部署 (Node.js 后端 + Vue 前端)
#
# 构建并启动：
#   docker compose build && docker compose up -d
#
# 访问：http://localhost:9200
# 健康检查：http://localhost:9200/api/health

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    image: ${XQ_IMAGE:-xqecz}:${XQ_TAG:-latest}
    container_name: xqecz-app
    mem_limit: 512m
    ports:
      - "${XQ_APP_PORT:-9200}:3000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
      - DB_PATH=/app/server/data/app.db
      - JWT_SECRET=${JWT_SECRET:-please-change-in-prod}
    volumes:
      - ./docker_data/uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
