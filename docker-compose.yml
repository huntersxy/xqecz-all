# xqecz-all 全栈部署
#
# 构建并启动：
#   docker compose build && docker compose up -d
#
# 访问：http://localhost:9200
# 查看 admin 初始密码：docker compose logs -f app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        GOLANG_IMAGE: ${GOLANG_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.20}
    image: ${XQ_IMAGE:-xqecz}:${XQ_TAG:-latest}
    container_name: xqecz-app
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${XQ_APP_PORT:-9200}:8080"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./docker_data/uploads:/app/uploads
      - ./docker_data/thumbnails:/app/thumbnails
      - ./docker_data/images:/app/images
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
