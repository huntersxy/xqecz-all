# xqecz-all 配置文件示例
# 复制此文件为 config.yaml 并修改配置

# 数据库配置
mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "root"
  database: "xqecz"
  charset: "utf8mb4"
  max_open_conns: 100
  min_conns: 10
  conn_max_lifetime: 3600
  conn_max_idle_time: 1800
  acquire_timeout: 10

# Redis配置
redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  timeout: 5
  prefix: "xqecz:"

# 服务器配置
server:
  port: 8080
  upload_dir: "./uploads"
  thumbnail_dir: "./thumbnails"
  images_dir: "./images"
  max_upload_size: 1073741824  # 1GB
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:9200"

# 推荐配置
recommend:
  excluded_tags: []

# 推送配置（JPush）
push:
  jpush_key: ""
  jpush_secret: ""
  enabled: false

# 垃圾评论API配置
spam_api:
  url: ""

# Tinify压缩配置
tinify:
  api_key: ""
  enabled: false

# 是否初始化管理员账户（首次运行时设置为true）
init_admin: false
